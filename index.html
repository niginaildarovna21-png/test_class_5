    let currentQuestions = [];
    let userAnswers = [];

    const subsectionsMap = {
        "Морфология": ["Глагол", "Имя прилагательное", "Имя существительное"],
        "Морфемика": ["Приставка", "Суффикс", "Морфемы"]
    };

    function updateSubsectionSelect() {
        const section = document.getElementById('sectionSelect').value;
        const subsections = subsectionsMap[section];
        const subsectionGroup = document.getElementById('subsectionGroup');
        const subsectionSelect = document.getElementById('subsectionSelect');
        
        if (subsections) {
            subsectionGroup.style.display = 'flex';
            subsectionSelect.innerHTML = '<option value="">-- Выберите подраздел --</option>' + 
                subsections.map(sub => `<option value="${sub}">${sub}</option>`).join('');
        } else {
            subsectionGroup.style.display = 'none';
            subsectionSelect.innerHTML = '';
        }
        newTest();
    }

    function getCurrentQuestionsArray() {
        const section = document.getElementById('sectionSelect').value;
        const subsection = document.getElementById('subsectionSelect').value;
        const classData = questionsDB["5"];
        
        if ((section === "Морфология" || section === "Морфемика") && subsection) {
            return classData[section]?.[subsection] || [];
        }
        return classData[section] || [];
    }

    function getRandomQuestions() {
    const questionsArray = getCurrentQuestionsArray();
    if (!questionsArray.length) return [];
    // Возвращаем ВСЕ вопросы раздела (не перемешивая и не обрезая)
    return [...questionsArray];
    }

        function renderQuestions() {
        if (!currentQuestions.length) {
            document.getElementById('questionsContainer').innerHTML = '<div class="empty">❌ Нет вопросов для выбранного раздела</div>';
            return;
        }
        let html = '';
        currentQuestions.forEach((q, idx) => {
            let optionsHtml = '';
            q.options.forEach((opt, optIdx) => {
                const checked = (userAnswers[idx] === optIdx) ? 'checked' : '';
                optionsHtml += `<div class="option"><input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}_${optIdx}" ${checked}><label for="q${idx}_${optIdx}">${String.fromCharCode(65+optIdx)}. ${opt}</label></div>`;
            });
            html += `<div class="question-card"><span class="q-num">Вопрос ${idx+1}</span><div class="question-text">${q.text}</div><div class="options">${optionsHtml}</div></div>`;
        });
        document.getElementById('questionsContainer').innerHTML = html;
        for (let i = 0; i < currentQuestions.length; i++) {
            const radios = document.querySelectorAll(`input[name="q${i}"]`);
            radios.forEach(radio => {
                radio.addEventListener('change', (e) => {
                    userAnswers[i] = parseInt(e.target.value);
                });
            });
        }
    }

    function checkTest() {
    if (!currentQuestions.length) {
        alert('Сначала создайте тест (кнопка "НОВЫЙ ТЕСТ")');
        return;
    }
    
    // Проверка: все ли вопросы имеют ответ
    let unanswered = [];
    for (let i = 0; i < currentQuestions.length; i++) {
        if (userAnswers[i] === '' || userAnswers[i] === null) {
            unanswered.push(i + 1);
        }
    }
    
    if (unanswered.length > 0) {
        let message = '⚠️ Вы не ответили на вопросы: ';
        if (unanswered.length === 1) {
            message = '⚠️ Вы не ответили на вопрос №' + unanswered[0];
        } else if (unanswered.length <= 5) {
            message = '⚠️ Вы не ответили на вопросы № ' + unanswered.join(', ');
        } else {
            message = '⚠️ Вы не ответили на ' + unanswered.length + ' вопросов (№ ' + unanswered.slice(0, 5).join(', ') + ' и др.)';
        }
        message += '\n\n✅ Ответьте на все вопросы, чтобы проверить тест.';
        alert(message);
        return;
    }
    
    // Подсчёт правильных ответов и подготовка данных для подсветки
    let correct = 0;
    let questionResults = [];
    
    for (let i = 0; i < currentQuestions.length; i++) {
        const user = userAnswers[i];
        const correctAns = currentQuestions[i].correct;
        const isCorrect = (user === correctAns);
        if (isCorrect) {
            correct++;
        }
        questionResults.push({
            isCorrect: isCorrect,
            userAnswer: user,
            correctAnswer: correctAns,
            userText: user !== undefined ? currentQuestions[i].options[user] : 'не выбран',
            correctText: currentQuestions[i].options[correctAns],
            explanation: currentQuestions[i].explanation
        });
    }
    
    // Перерисовываем вопросы с подсветкой
    let html = '';
    currentQuestions.forEach((q, idx) => {
        const result = questionResults[idx];
        let cardClass = 'question-card';
        let resultIcon = '';
        
        if (result.isCorrect) {
            cardClass += ' correct-card';
            resultIcon = '<span style="color: #10b981; margin-left: 10px;">✅</span>';
        } else {
            cardClass += ' wrong-card';
            resultIcon = '<span style="color: #ef4444; margin-left: 10px;">❌</span>';
        }
        
        let optionsHtml = '';
        q.options.forEach((opt, optIdx) => {
            let optionClass = 'option';
            let extraMark = '';
            if (optIdx === result.correctAnswer) {
                extraMark = ' ✅';
            }
            if (optIdx === result.userAnswer && !result.isCorrect) {
                optionClass += ' user-wrong';
            }
            const checked = (userAnswers[idx] === optIdx) ? 'checked' : '';
            optionsHtml += `
                <div class="${optionClass}">
                    <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}_${optIdx}" ${checked} disabled>
                    <label for="q${idx}_${optIdx}" style="${optIdx === result.correctAnswer ? 'color: #10b981; font-weight: bold;' : (optIdx === result.userAnswer && !result.isCorrect ? 'color: #ef4444;' : '')}">${String.fromCharCode(65+optIdx)}. ${opt}${extraMark}</label>
                </div>
            `;
        });
        
        let feedbackHtml = '';
        if (!result.isCorrect) {
            feedbackHtml = `<div style="margin-top: 12px; padding: 8px 12px; background: #fef2f2; border-radius: 12px; color: #b91c1c; font-size: 0.85rem;"><span style="font-weight: bold;">Правильный ответ:</span> (${String.fromCharCode(65+result.correctAnswer)}) ${result.correctText}<br><span style="font-weight: bold;">📖 Пояснение:</span> ${result.explanation}</div>`;
        } else {
            feedbackHtml = `<div style="margin-top: 12px; padding: 8px 12px; background: #f0fdf4; border-radius: 12px; color: #166534; font-size: 0.85rem;"><span style="font-weight: bold;">✅ Верно!</span> ${result.explanation}</div>`;
        }
        
        html += `
            <div class="${cardClass}" style="border-left: 4px solid ${result.isCorrect ? '#10b981' : '#ef4444'};">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <span class="q-num">Вопрос ${idx+1}</span>
                    ${resultIcon}
                </div>
                <div class="question-text">${q.text}</div>
                <div class="options">${optionsHtml}</div>
                ${feedbackHtml}
            </div>
        `;
    });
    
    document.getElementById('questionsContainer').innerHTML = html;
    
    // Блок с результатом
    const total = currentQuestions.length;
    const percent = Math.round(correct / total * 100);
    let grade = 2;
    let gradeText = "Неудовлетворительно";
    if (percent >= 80) { grade = 5; gradeText = "Отлично"; }
    else if (percent >= 65) { grade = 4; gradeText = "Хорошо"; }
    else if (percent >= 50) { grade = 3; gradeText = "Удовлетворительно"; }
    else { grade = 2; gradeText = "Неудовлетворительно"; }
    
    let scoreColor = (grade === 5 || grade === 4) ? 'result-good' : 'result-bad';
    document.getElementById('resultContainer').innerHTML = `<div class="result-card"><div class="result-score ${scoreColor}">📊 Результат: ${correct} из ${total} (${percent}%)<br>🎓 Оценка: ${grade} (${gradeText})</div></div>`;
    
    // Кнопка "НОВЫЙ ТЕСТ" остаётся активной
}

    function newTest() 
    {
        currentQuestions = getRandomQuestions();
        userAnswers = new Array(currentQuestions.length).fill(null);
        renderQuestions();
        document.getElementById('resultContainer').innerHTML = '';
        const section = document.getElementById('sectionSelect').value;
        const subsection = document.getElementById('subsectionSelect').value;
        let count = 0;
    
        // Получаем количество вопросов для выбранного раздела/подраздела
        if ((section === "Морфология" || section === "Морфемика") && subsection) {
            count = questionsDB["5"][section]?.[subsection]?.length || 0;
        } else {
            count = questionsDB["5"][section]?.length || 0;
        }
    
        if (subsection) {
            document.getElementById('stats').innerHTML = `📚 5 класс | ${section} → ${subsection} | Всего вопросов: ${count}`;
        } 
        else {
            document.getElementById('stats').innerHTML = `📚 5 класс | ${section} | Всего вопросов: ${count}`;
        }
    }

    document.getElementById('sectionSelect').addEventListener('change', updateSubsectionSelect);
    document.getElementById('subsectionSelect').addEventListener('change', () => newTest());
    document.getElementById('checkBtn').addEventListener('click', checkTest);
    document.getElementById('newTestBtn').addEventListener('click', newTest);
    
    updateSubsectionSelect();
</script>
